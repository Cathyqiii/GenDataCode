[Data]
# 数据集名称
data_name = FD004
# 预测模式
feature_mode = MS
# 序列长度
seq_len = 33
# 条件维度
condition_dim = 1
# 数据维度
data_dim = 15

[Model]
# VAE隐藏层维度
vae_hidden_dim = 64
# VAE潜在空间维度
vae_latent_dim = 16
# 嵌入维度 → 提升条件嵌入能力
embedding_dim = 64
# Mamba特征维度 → 增强时序特征提取
mamba_dim = 128
# 隐藏层维度 → 匹配Mamba维度，提升模型容量
hidden_dim = 128
# Mamba尺度 → 适配33长度时序，精简冗余尺度
scales = [1, 2, 4]
# 扩散时间步数 → 增加扩散步数，提升生成精细度
diffusion_steps = 1000
# Mamba层数 → 核心修复！增强长时序依赖建模
mamba_num_layers = 2

[Training]
# 批次大小 → 缩小批次，提升梯度稳定性
BATCH_SIZE = 16
# 学习率 → 核心修复！修正学习率，保证时序特征学习
LR = 2e-4
# 训练迭代次数
EPOCHS = 300
# 梯度裁剪阈值 → 放宽裁剪，允许模型学习复杂时序特征
grad_clip = 1.0
# 学习率调度器类型
lr_scheduler = CosineAnnealingLR
# 学习率调度器参数
lr_scheduler_params = {"T_max": 150, "eta_min": 1e-7}
# 早停耐心次数 → 缩短耐心，防止过拟合
early_stop_patience = 15
# 早停损失改善阈值
early_stop_delta = 1e-5
# 梯度累积步数 → 补偿小批次，保持有效批次大小
grad_accumulation_steps = 1

[Hardware]
# 使用的设备
device = cuda:0
# GPU索引
gpu_index = 0

[Paths]
# Condition VAE检查点路径
condition_vae_ckpt = ./lib/VAE/checkpoints/FD001_seq_condition_vae.pth
# 检查点保存目录
checkpoint_dir = ./output/FD001/checkpoint
# 生成数据保存目录
generated_data_dir = ./output/FD004

[Generation]
# 生成样本数量倍数
generate_times = 2