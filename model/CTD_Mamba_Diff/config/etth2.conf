[Data]
# 数据集名称（固定，ETTh2原生配置）
data_name = etth2
# 预测模式（固定，单变量频域建模最优）
feature_mode = S
# 序列长度（固定，原生序列长度）
seq_len = 108
# 条件维度（固定）
condition_dim = 6
# 数据维度（固定，单变量适配FEDformer频域输入）
data_dim = 1

[Model]
# ==================== 核心修改：增强频域/周期特征捕捉，适配FEDformer ====================
# VAE隐藏层：提升至256，精准捕捉ETTh2周期+频域条件分布
vae_hidden_dim = 256
# VAE潜在空间：提升至64，消除信息瓶颈，完整保留相位/周期/频域特征（FEDformer核心需求）
vae_latent_dim = 64
# 嵌入维度：256，强化频域特征表达
embedding_dim = 256
# Mamba特征维度：与嵌入对齐，长序列周期建模
mamba_dim = 256
# 隐藏层维度：同步提升
hidden_dim = 256
# Mamba尺度：新增8倍长尺度，专门捕捉ETTh2长周期规律（FEDformer长程频域依赖）
scales = [1, 2, 4, 8]
# 扩散步数：保持1000（标准DDPM，去噪最平滑，无人工噪声）
DIFFUSION_STEPS = 1000
# Mamba层数：3层，深度建模长程频域/趋势特征
mamba_num_layers = 3

[Training]
# ==================== 核心修改：训练更稳定，生成数据无偏移、无噪声 ====================
# 批次大小：16，小批量精细拟合原始分布
BATCH_SIZE = 16
# 学习率：降低为8e-5，精细收敛，避免生成伪周期/噪声
LR = 8e-5
# 训练轮次：400，充分收敛，让生成数据100%对齐原始频域
EPOCHS = 400
# 梯度裁剪：0.8，严格限制梯度，生成序列更平滑
grad_clip = 0.8
# 学习率调度器（固定）
lr_scheduler = CosineAnnealingLR
# 调度器参数：适配400轮，最小学习率更低，精细优化
lr_scheduler_params = {"T_max": 400, "eta_min": 1e-8}
# 早停耐心：60，防止过早停止，充分优化
early_stop_patience = 60
# 早停阈值：1e-5，极致敏感捕捉提升
early_stop_delta = 1e-5
# 梯度累积：2步，等效Batch=32，训练稳定不震荡
grad_accumulation_steps = 2

[Hardware]
device = cuda:0
gpu_index = 0

[Paths]
condition_vae_ckpt = ./lib/VAE/checkpoints/etth2_seq_condition_vae.pth
checkpoint_dir = ./output/etth2/checkpoint
generated_data_dir = ./output/etth2

[Generation]
# ==================== 核心修改：FEDformer大忌！禁止过量生成引入噪声 ====================
# 生成倍数：从6降至2，只生成【高质量、高保真】样本（过量生成会稀释原始特征，导致FEDformer崩盘）
generate_times = 2