[Data]
# 数据集名称
data_name = Traffic
# 预测模式
feature_mode = S
# 序列长度
seq_len = 108
# 条件维度
condition_dim = 7
# 数据维度
data_dim = 1

[Model]
# VAE隐藏层维度
vae_hidden_dim = 64
# VAE潜在空间维度
vae_latent_dim = 8
# 嵌入维度
embedding_dim = 64
# Mamba特征维度
mamba_dim = 64
# 隐藏层维度
hidden_dim = 64
# Mamba尺度
scales = [1, 2, 4]
# 扩散时间步数 - 恢复步数保证数据多样性
DIFFUSION_STEPS = 400
# Mamba层数
mamba_num_layers = 1

[Training]
# 批次大小 - 小批量适配高噪声交通数据
BATCH_SIZE = 8
# 学习率 - 降低学习率稳定训练
LR = 8e-5
# 训练迭代次数 - 适配数据收敛周期
EPOCHS = 300
# 梯度裁剪阈值 - 保证训练稳定性
grad_clip = 0.8
# 学习率调度器类型
lr_scheduler = CosineAnnealingLR
# 学习率调度器参数 - 余弦退火平滑衰减
lr_scheduler_params = {"T_max": 120, "eta_min": 5e-7}
# 早停耐心次数 - 避免过早停止
early_stop_patience = 25
# 早停损失改善阈值 - 放宽限制
early_stop_delta = 1e-4
# 梯度累积步数 - 模拟大批次，稳定梯度
grad_accumulation_steps = 4

[Hardware]
# 使用的设备
device = cuda:0
# GPU索引
gpu_index = 0

[Paths]
# Condition VAE检查点路径
condition_vae_ckpt = ./lib/VAE/checkpoints/Traffic_seq_condition_vae.pth
# 检查点保存目录
checkpoint_dir = ./output/Traffic/checkpoint
# 生成数据保存目录
generated_data_dir = ./output/Traffic

[Generation]
# 生成样本数量倍数
generate_times = 3