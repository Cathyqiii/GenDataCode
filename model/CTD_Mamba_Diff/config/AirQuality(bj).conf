[Data]
# 数据集名称
data_name = AirQuality(bj)
# 预测模式
feature_mode = M
# 序列长度
seq_len = 108
# 条件维度
condition_dim = 6
# 数据维度
data_dim = 1

[Model]
# VAE隐藏层维度 - 适配多变量空气质量数据
vae_hidden_dim = 96
# VAE潜在空间维度
vae_latent_dim = 16
# 嵌入维度
embedding_dim = 64
# Mamba特征维度
mamba_dim = 64
# 隐藏层维度
hidden_dim = 64
# Mamba尺度
scales = [1, 2, 4]
# 扩散时间步数 - 400步平衡质量与速度，避免数值不稳定
DIFFUSION_STEPS = 400
# Mamba层数
mamba_num_layers = 1

[Training]
# 批次大小
BATCH_SIZE = 16
# 学习率
LR = 1e-4
# 训练迭代次数
EPOCHS = 300
# 梯度裁剪阈值
grad_clip = 0.8
# 学习率调度器类型
lr_scheduler = CosineAnnealingLR
# 学习率调度器参数
lr_scheduler_params = {"T_max": 150, "eta_min": 5e-7}
# 早停耐心次数
early_stop_patience = 30
# 早停损失改善阈值
early_stop_delta = 1e-4
# 梯度累积步数
grad_accumulation_steps = 2

[Hardware]
# 使用的设备
device = cuda:0
# GPU索引
gpu_index = 0

[Paths]
# Condition VAE检查点路径
condition_vae_ckpt = ./lib/VAE/checkpoints/AirQuality_bj_seq_condition_vae.pth
# 检查点保存目录
checkpoint_dir = ./output/AirQuality(bj)/checkpoint
# 生成数据保存目录
generated_data_dir = ./output/AirQuality(bj)

[Generation]
# 生成样本数量倍数
generate_times = 2