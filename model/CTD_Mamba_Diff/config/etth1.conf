[Data]
data_name = etth1
feature_mode = S
seq_len = 108
condition_dim = 6
data_dim = 1

[Model]
vae_hidden_dim = 128
vae_latent_dim = 16
embedding_dim = 64
mamba_dim = 128
hidden_dim = 128
scales = [1, 2, 4]
# 单变量强时序：降低扩散步数，保留趋势
diffusion_steps = 200
mamba_num_layers = 3

[Training]
BATCH_SIZE = 2
LR = 3e-5
EPOCHS = 300
grad_clip = 1.0
lr_scheduler = CosineAnnealingLR
lr_scheduler_params = {"T_max": 250, "eta_min": 1e-6}
# ✅ 保留早停！仅延长耐心（适配小样本），其他数据集默认30
early_stop_patience = 80
early_stop_delta = 1e-4
grad_accumulation_steps = 1

[Hardware]
device = cuda:0
gpu_index = 0

[Paths]
condition_vae_ckpt = VAE/checkpoints/ETTh1_seq_condition_vae.pth
checkpoint_dir = ./output/etth1/checkpoint
generated_data_dir = ./output/etth1

[Generation]
generate_times = 3