[Data]
# 数据集名称
data_name = etth2
# 数据维度（z_dim）
z_dim = 1
# 序列长度
seq_len = 96

[Model]
# 模型类型
model = TimeGAN
# 使用的模块（gru, lstm, lstmLN）
module = gru
# 隐藏层维度
hidden_dim = 24
# 网络层数
num_layer = 3

[Training]
# 训练迭代次数
iteration = 30000
# 批次大小
batch_size = 128
# 计算指标的迭代间隔
metric_iteration = 10
# 是否进行训练
isTrain = True
# 学习率
lr = 0.001
# Adam优化器的beta1
beta1 = 0.9
# 损失函数权重：Gamma
w_gamma = 1.0
# 损失函数权重：Encoder (es)
w_es = 0.1
# 损失函数权重：Encoder (e0)
w_e0 = 10.0
# 损失函数权重：Generator
w_g = 100.0
# 控制台打印频率
print_freq = 1000
# 是否加载预训练权重
load_weights = False
# 恢复训练的检查点路径
resume =
# 是否使用visdom进行可视化
display = False

[System]
# 数据加载的工作进程数
workers = 8
# 使用的设备（gpu/cpu）
device = gpu
# GPU ID列表（逗号分隔）
gpu_ids = 0
# 使用的GPU数量
ngpu = 1
# 输出文件夹路径
outf = output
# 实验名称
name = etth2_timegan
# 手动随机种子（-1表示随机）
manualseed = -1

[Visdom]
# Visdom服务器地址
display_server = http://localhost
# Visdom端口
display_port = 8097
# Visdom窗口ID
display_id = 0